name: Tarla Uygulamasi APK Oluşturucu

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js (V24) Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Java (JDK 21) Kurulumu
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Projeyi Başlat ve Konum Eklentisini Kur
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/android
          # 2. İSTEK: Geolocation eklentisini projeye dahil ediyoruz
          npm install @capacitor/geolocation
          npm install -D @capacitor/cli

      - name: Sahte Web Klasörü Oluştur
        run: mkdir -p www && echo "Yukleniyor..." > www/index.html

      - name: Capacitor Ayarlarını Yapılandır
        run: |
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.sahintarla.app",
            "appName": "TarlaTakip",
            "webDir": "www",
            "server": {
              "url": "https://tarlavetakip.netlify.app/",
              "cleartext": true
            }
          }
          EOF

      - name: Android Platformunu Ekle
        run: npx cap add android

      - name: Android İzinleri, Konum Pop-up ve Shizuku Altyapısını Enjekte Et
        run: |
          # 1. İSTEK: AndroidManifest.xml dosyasını tüm izinlerle sıfırdan oluşturuyoruz
          cat <<'EOF' > android/app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="moe.shizuku.manager.permission.API_V23" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme">

                  <activity
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
                      android:name=".MainActivity"
                      android:label="@string/title_activity_main"
                      android:theme="@style/AppTheme.NoActionBarLaunch"
                      android:exported="true">

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>

                  </activity>

                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="${applicationId}.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths"></meta-data>
                  </provider>
              </application>
          </manifest>
          EOF

          # 3. İSTEK: MainActivity.kt dosyasını açılışta yerel konum izni isteyecek şekilde güncelliyoruz
          mkdir -p android/app/src/main/java/com/sahintarla/app
          cat <<'EOF' > android/app/src/main/java/com/sahintarla/app/MainActivity.kt
          package com.sahintarla.app

          import android.Manifest
          import android.content.pm.PackageManager
          import android.os.Bundle
          import androidx.core.app.ActivityCompat
          import androidx.core.content.ContextCompat
          import com.getcapacitor.BridgeActivity

          class MainActivity : BridgeActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  
                  // Uygulama açıldığı an telefona "Konum İzni Ver" penceresini fırlatır
                  val permissions = arrayOf(
                      Manifest.permission.ACCESS_FINE_LOCATION,
                      Manifest.permission.ACCESS_COARSE_LOCATION
                  )
                  
                  val missingPermissions = permissions.filter {
                      ContextCompat.checkSelfPermission(this, it) != PackageManager.PERMISSION_GRANTED
                  }
                  
                  if (missingPermissions.isNotEmpty()) {
                      ActivityCompat.requestPermissions(this, missingPermissions.toTypedArray(), 1001)
                  }
              }
          }
          EOF

          # EKSTRA: İleride kullanacağın Shizuku kütüphane bağımlılıklarını Gradle motoruna işliyoruz
          cat <<'EOF' >> android/app/build.gradle

          dependencies {
              implementation "dev.rikka.shizuku:api:13.1.0"
              implementation "dev.rikka.shizuku:provider:13.1.0"
          }
          EOF

      - name: Android Platformunu Senkronize Et
        run: npx cap sync android

      - name: APK Derlemesini Başlat
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace
          
      - name: Çıkan APK Dosyasını Yükle
        uses: actions/upload-artifact@v4
        with:
          name: Tarla-Takip-Uygulamasi-Konumlu-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
