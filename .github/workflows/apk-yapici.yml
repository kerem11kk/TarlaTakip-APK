name: Tarla Uygulamasi APK Oluşturucu

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js (V24) Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Java (JDK 21) Kurulumu
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Projeyi Başlat ve Capacitor Kur
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli

      - name: Sahte Web Klasörü Oluştur
        run: mkdir -p www && echo "Yukleniyor..." > www/index.html

      - name: Capacitor Ayarlarını Yapılandır
        run: |
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.sahintarla.app",
            "appName": "TarlaTakip",
            "webDir": "www",
            "server": {
              "url": "https://tarlavetakip.netlify.app/",
              "cleartext": true
            }
          }
          EOF

      - name: Android Platformunu Ekle ve Senkronize Et
        run: |
          npx cap add android
          npx cap sync android

      - name: APK Derlemesini Başlat
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace
          
      - name: Çıkan APK Dosyasını Yükle
        uses: actions/upload-artifact@v4
        with:
          name: Tarla-Takip-Uygulamasi-Hazir-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
