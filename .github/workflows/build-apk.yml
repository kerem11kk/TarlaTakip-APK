name: Build Android APK

on:
  push:
    branches:
      - main 

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Kodu Klonla
        uses: actions/checkout@v3

      - name: Node.js Kurulumu
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Java JDK 17 Kurulumu (Gradle için)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Paketleri Yükle ve Vite Projesini Derle
        run: |
          npm install
          npm run build

      - name: Capacitor Android Senkronizasyonu
        run: |
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli
          npx cap init tarlavetakip com.elbistan.tarlavetakip --web-dir dist || true
          npx cap add android || true
          npx cap sync android

      - name: APK Derleme (Assemble Debug)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: APK Dosyasını Çıktı Olarak Ver
        uses: actions/upload-artifact@v3
        with:
          name: tarlavetakip-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
